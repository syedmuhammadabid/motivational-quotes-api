<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motivational Quotes</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <h1>✨ Motivational Quotes</h1>

        <div class="quote-card" id="quote-card">
            <p class="quote-text" id="quote-text">Click the button to get inspired!</p>
            <p class="quote-author" id="quote-author"></p>
        </div>

        <button class="btn" id="get-quote-btn">Get Random Quote</button>

        <details class="all-quotes-section">
            <summary class="btn btn-secondary">View All Quotes</summary>
            <div id="all-quotes-list" class="quotes-list"></div>
        </details>
    </div>

    <script>
        const quoteText = document.getElementById('quote-text');
        const quoteAuthor = document.getElementById('quote-author');
        const quoteCard = document.getElementById('quote-card');
        const getQuoteBtn = document.getElementById('get-quote-btn');
        const allQuotesList = document.getElementById('all-quotes-list');

        getQuoteBtn.addEventListener('click', async () => {
            const res = await fetch('/quote');
            const data = await res.json();
            quoteCard.classList.remove('fade-in');
            void quoteCard.offsetWidth;
            quoteCard.classList.add('fade-in');
            quoteText.textContent = `"${data.quote}"`;
            quoteAuthor.textContent = `— ${data.author}`;
        });

        document.querySelector('.all-quotes-section').addEventListener('toggle', async (e) => {
            if (e.target.open && allQuotesList.children.length === 0) {
                const res = await fetch('/quotes');
                const data = await res.json();
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'quote-item';
                    div.innerHTML = `<p class="quote-text">"${item.quote}"</p>
                                     <p class="quote-author">— ${item.author}</p>`;
                    allQuotesList.appendChild(div);
                });
            }
        });
        document.querySelector('.all-quotes-section').addEventListener('toggle', async (e) => {
            const summary = e.target.querySelector('summary');
            if (e.target.open) {
                summary.textContent = 'Hide All Quotes';
                if (allQuotesList.children.length === 0) {
                    const res = await fetch('/quotes');
                    const data = await res.json();
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'quote-item';
                        div.innerHTML = `<p class="quote-text">"${item.quote}"</p>
                                 <p class="quote-author">— ${item.author}</p>`;
                        allQuotesList.appendChild(div);
                    });
                }
            } else {
                summary.textContent = 'View All Quotes';
            }
        });
    </script>
</body>

</html>
